name: Deploy Angular Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  # IMPORTANT: Change this to your repository name!
  # Example: If your repo is github.com/username/learning-platform, use '/learning-platform/'
  # If using a custom domain, use '/'
  BASE_HREF: '/learning-platform/'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Angular App
        run: npm run build -- --configuration production --base-href ${{ env.BASE_HREF }}

      - name: Copy index.html to 404.html (Fixes SPA routing on GitHub Pages)
        run: cp dist/learning-platform/browser/index.html dist/learning-platform/browser/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist/learning-platform/browser
          publish_branch: gh-pages
          commit_message: "Deploy frontend to GitHub Pages"
