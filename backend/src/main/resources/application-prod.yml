spring:
  application:
    name: learning-platform-api
  
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require&allowMultiQueries=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      auto-commit: true
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 20
          fetch_size: 50
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
  
  security:
    user:
      name: admin
      password: admin123

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
    min-response-size: 1024

jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-change-in-production-minimum-32-characters-long}
  expiration: 900000
  refresh-expiration: 604800000

logging:
  level:
    root: WARN
    com.enterprise.learning: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
