server:
  port: ${PORT:8080}
  address: 0.0.0.0
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true

spring:
  application:
    name: learning-platform-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:learning_platform}?sslmode=${DB_SSLMODE:disable}&allowMultiQueries=true&serverTimezone=UTC
    username: ${DB_USER:learning_user}
    password: ${DB_PASSWORD:learning_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
  
  security:
    user:
      name: admin
      password: admin123

jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-change-in-production-minimum-32-characters-long}
  expiration: 900000
  refresh-expiration: 604800000

logging:
  level:
    root: INFO
    com.enterprise.learning: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
