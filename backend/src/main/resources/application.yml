spring:
  application:
    name: learning-platform-api
  
  datasource:
    url: jdbc:postgresql://localhost:5432/learning_platform
    username: learning_user
    password: learning_password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
  
  security:
    user:
      name: admin
      password: admin123

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: your-super-secret-jwt-key-change-in-production-minimum-32-characters-long
  expiration: 900000
  refresh-expiration: 604800000

logging:
  level:
    root: INFO
    com.enterprise.learning: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
